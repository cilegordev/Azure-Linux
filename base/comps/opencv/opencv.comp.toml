[components.opencv]

# OpenNI is an old (v1.5.7) Kinect/PrimeSense depth sensor library not available
# in Azure Linux and not relevant for a cloud/server distro.
#
# Disable ffmpeg and xine support as part of removing ffmpeg/libav* from
# Azure Linux. OpenCV's videoio module loses its FFmpeg and Xine video I/O
# backends; gstreamer and v4l2 backends remain available.
[components.opencv.build]
without = ["openni", "ffmpeg", "xine"]

# AZL does not ship libavif — disable avif support in imgcodecs.
# No bcond exists; need to remove the BR and pass -DWITH_AVIF=OFF.

[[components.opencv.overlays]]
description = "Remove libavif BuildRequires (libavif not available in AZL)"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "pkgconfig(libavif)"

[[components.opencv.overlays]]
description = "Disable avif support in opencv imgcodecs"
type = "spec-search-replace"
section = "%build"
regex = '%cmake \\'
replacement = '''%cmake \
 -DWITH_AVIF=OFF \'''

# CVE-2025-53644 patch targets bundled 3rdparty/openjpeg, which Fedora's spec
# deletes during %prep (it uses system openjpeg2-devel instead). The patch
# can't find the file and fails. Remove both the patch declaration and its
# application. The CVE fix belongs in the system openjpeg package, not here.
# Upstream Fedora offending commit: https://src.fedoraproject.org/rpms/opencv/c/f7431cf

[[components.opencv.overlays]]
description = "Remove CVE-2025-53644 patch — targets bundled openjpeg that is deleted in %prep; fix belongs in system openjpeg package"
type = "patch-remove"
file = "**/a39db41390de546d18962ee1278bd6dbb715f466.patch"

[[components.opencv.overlays]]
description = "Remove application of CVE-2025-53644 patch (see above)"
type = "spec-search-replace"
regex = '%patch.*cve2025-53644'
replacement = ""

# v4l-utils/libv4l not shipped in AZL. Disable the libv4l userspace wrapper
# while keeping the kernel V4L2 API available (WITH_V4L defaults to ON).

[[components.opencv.overlays]]
description = "Remove libv4l-devel BuildRequires — libv4l not shipped in AZL"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "libv4l-devel"

[[components.opencv.overlays]]
description = "Disable libv4l userspace wrapper — kernel V4L2 API still available via WITH_V4L (default ON)"
type = "spec-search-replace"
section = "%build"
regex = '-DWITH_LIBV4L=ON'
replacement = '-DWITH_LIBV4L=OFF'
