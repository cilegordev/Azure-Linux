[components.sox]

# AZL does not ship opusfile — remove the BR so sox builds without opus support.
# Sox autodetects opusfile via pkg-config; without it, opus playback is disabled.

[[components.sox.overlays]]
description = "Remove opusfile-devel from BuildRequires (opusfile not available in AZL)"
type = "spec-search-replace"
regex = 'BuildRequires: pulseaudio-libs-devel, opusfile-devel'
replacement = 'BuildRequires: pulseaudio-libs-devel'
