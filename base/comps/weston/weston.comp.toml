# Drop the BuildRequires on neatvnc and disable the meson backend-vnc
# option. neatvnc BuildRequires libavcodec/libavfilter/libavutil; Azure
# Linux is removing ffmpeg/libav* (and neatvnc itself) from the distro.
#
# Practical impact: weston's vnc-backend.so (VNC remote screensharing
# compositor) is no longer built; other weston backends (drm, wayland,
# x11, headless, pipewire, rdp) are unaffected.
[components.weston]

[[components.weston.overlays]]
description = "Drop BuildRequires on neatvnc — removing ffmpeg/libav* and neatvnc from the distro"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "(pkgconfig(neatvnc) >= 0.7.0 with pkgconfig(neatvnc) < 0.10.0)"

[[components.weston.overlays]]
description = "Pass -Dbackend-vnc=false to meson — neatvnc no longer available"
type = "spec-search-replace"
regex = '^%meson$'
replacement = "%meson -Dbackend-vnc=false"

[[components.weston.overlays]]
description = "Drop vnc-backend.so from %files — no longer built"
type = "spec-search-replace"
regex = '^%\{_libdir\}/libweston-%\{apiver\}/vnc-backend\.so$'
replacement = ""

[[components.weston.overlays]]
description = "Drop weston-remote-access PAM config from %files — only installed by the VNC backend, which is now disabled"
type = "spec-search-replace"
regex = '^%config\(noreplace\) %\{_sysconfdir\}/pam\.d/weston-remote-access$'
replacement = ""
