# The upstream `espeak-ng-1.51.1.tar.gz` ships a demo asset that trips
# anti-malware scanning on the AZL RPM-signing pipeline, which rejects
# webshell-class payloads inside SRPMs:
#
#   - chromium_extension/index.php
#       A 10-line demo PHP shim for the sample Chromium extension that
#       forwards POST-ed shell commands via `passthru($_POST["espeakng"])`.
#       AV scanners flag it as PHP/Webshell.NWM trojan (correctly: by design
#       it executes arbitrary attacker-supplied shell input).
#
# The `chromium_extension/` directory is a sample browser-extension demo;
# our spec does not reference it or ship it in any binary RPM, so stripping
# this file is functionally inert.
#
# Replace upstream Source0 with a deterministically-repacked tarball produced
# by base/comps/espeak-ng/modify_source.sh. The upstream filename is preserved
# so `replace-upstream = true` swaps the entry in place in the Fedora `sources`
# manifest without requiring a `Source0`/filename change.
