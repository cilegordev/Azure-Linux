# Components whose upstream specs have a mingw bcond that should be disabled.
# Azure Linux does not ship mingw cross-compilation toolchains.
#
# Components listed here inherit build.without = ["mingw"] via the group's
# default-component-config. If a component also has its own build.without
# in a dedicated comp.toml, the lists are merged (appended).
[component-groups.mingw-disabled]
description = "Disable mingw cross-compilation bcond for components that support it"
#
# NOTE: Components whose upstream spec hard-codes `%global with_mingw 1` based
# on `%{?fedora}` (rather than using `%bcond_with(out) mingw`) cannot be
# disabled via this group — the `--without mingw` build flag has no effect on
# them. Such components require a dedicated spec-search-replace overlay
# instead (see e.g. base/comps/libsoup3, libyaml, dtc, gcab, libgsf, gtk-vnc,
# nghttp2).
components = [
    "cereal",
    "check",
    "eigen3",
    "enchant2",
    "flatbuffers",
    "fltk",
    "freexl",
    "geos",
    "gnutls",
    "inih",
    "json-c",
    "leptonica",
    "libgeotiff",
    "libkml",
    "liblerc",
    "libosinfo",
    "librttopo",
    "libsodium",
    "libspatialite",
    "libusb1",
    "libvirt",
    "libvirt-glib",
    "libwebp",
    "libxmlb",
    "openjpeg",
    "osinfo-db",
    "osinfo-db-tools",
    "p11-kit",
    "proj",
    "python-pillow",
    "shapelib",
    "taglib",
    "tesseract",
    "uriparser",
    "wavpack",
    "xerces-c",
]

[component-groups.mingw-disabled.default-component-config.build]
without = ["mingw"]
