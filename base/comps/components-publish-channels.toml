#
# Component-based config for package publishing
# Please keep the base-packages components list sorted alphabetically
# The exceptions list is grouped by category instead
#

# Project-wide default: unless otherwise specified, packages are published to sdk.
[default-component-config.publish]
rpm-channel = "rpm-sdk"
srpm-channel = "rpm-sdk-srpm"
debuginfo-channel = "rpm-sdk-debuginfo"

# This group includes packages intentionally included in `base`, along with
# the transitive closure of their *runtime* dependencies.
[component-groups.base-packages]
description = "base packages"
default-component-config.publish.srpm-channel = "rpm-base-srpm"
default-component-config.publish.rpm-channel = "rpm-base"
default-component-config.publish.debuginfo-channel = "rpm-base-debuginfo"
