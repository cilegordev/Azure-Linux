[components.systemd]

# AZL's setup package is 2.15.0-1, but upstream Fedora 41+ systemd requires >= 2.15.0-3.
# Lower the version threshold to match what's available in AZL.
# Ref: https://src.fedoraproject.org/rpms/setup/commits/rawhide (2.15.0-3 added /usr/lib/sysusers.d ownership)

[[components.systemd.overlays]]
description = "Lower BuildRequires on setup from 2.15.0-3 to 2.15.0-1 to match AZL's available version"
type = "spec-search-replace"
regex = '^BuildRequires:\s+setup >= 2\.15\.0-3$'
replacement = "BuildRequires:  setup >= 2.15.0-1"

[[components.systemd.overlays]]
description = "Lower Conflicts on setup from 2.15.0-3 to 2.15.0-1 to match AZL's available version"
type = "spec-search-replace"
regex = '^Conflicts:\s+setup < 2\.15\.0-3$'
replacement = "Conflicts:      setup < 2.15.0-1"

[[components.systemd.overlays]]
description = "Remove xen-devel BuildRequires — not available in AZL (AZL targets Hyper-V/Azure, not Xen)"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "xen-devel"

[[components.systemd.overlays]]
description = "Disable Xen in meson — set have_xen to 0 so -Dxenctrl=disabled (no targeted overlay for %global)"
type = "spec-search-replace"
regex = '%global have_xen 1'
replacement = "%global have_xen 0"

[[components.systemd.overlays]]
description = "Disable udev rule that sets default io scheduler to bfq"
type = "file-search-replace"
file = "60-block-scheduler.rules"
regex = "(?m)^"
replacement = "#"

[[components.systemd.overlays]]
description = "Set default llmnr support to disabled"
type = "spec-search-replace"
regex = '-Ddefault-llmnr=.*$'
replacement = "-Ddefault-llmnr=no"

[[components.systemd.overlays]]
description = "Remove build params reducing default timeout to 45s; leaving upstream default of 90s"
type = "spec-search-replace"
regex = '-Ddefault-timeout-sec=45'
replacement = "#-Ddefault-timeout-sec=45"

[[components.systemd.overlays]]
description = "Remove build params reducing default timeout to 45s; leaving upstream default of 90s"
type = "spec-search-replace"
regex = '-Ddefault-user-timeout-sec=45'
replacement = "#-Ddefault-user-timeout-sec=45"
