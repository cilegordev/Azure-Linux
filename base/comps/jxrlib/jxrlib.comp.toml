[components.jxrlib]

# Azure Linux does not ship mingw cross-compilation toolchains.
# Remove all mingw subpackages and their build dependencies.

[[components.jxrlib.overlays]]
description = "Remove mingw32-jxrlib subpackage — Azure Linux does not ship mingw toolchains"
type = "spec-remove-subpackage"
package = "mingw32-%{name}"

[[components.jxrlib.overlays]]
description = "Remove mingw64-jxrlib subpackage"
type = "spec-remove-subpackage"
package = "mingw64-%{name}"

[[components.jxrlib.overlays]]
description = "Remove mingw32-filesystem BuildRequires"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "mingw32-filesystem >= 95"

[[components.jxrlib.overlays]]
description = "Remove mingw32-gcc BuildRequires"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "mingw32-gcc"

[[components.jxrlib.overlays]]
description = "Remove mingw64-filesystem BuildRequires"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "mingw64-filesystem >= 95"

[[components.jxrlib.overlays]]
description = "Remove mingw64-gcc BuildRequires"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "mingw64-gcc"

[[components.jxrlib.overlays]]
description = "Remove mingw patch (only needed for mingw cross-compilation)"
type = "patch-remove"
file = "jxrlib_mingw.patch"

[[components.jxrlib.overlays]]
description = "Remove mingw cmake build step"
type = "spec-search-replace"
section = "%build"
regex = '^\%mingw_cmake$'
replacement = ''

[[components.jxrlib.overlays]]
description = "Remove mingw make build step"
type = "spec-search-replace"
section = "%build"
regex = '^\%mingw_make_build$'
replacement = ''

[[components.jxrlib.overlays]]
description = "Remove mingw install step"
type = "spec-search-replace"
section = "%install"
regex = '^\%mingw_make_install$'
replacement = ''

[[components.jxrlib.overlays]]
description = "Remove mingw guiddef.h cleanup (mingw32)"
type = "spec-search-replace"
section = "%install"
regex = '^rm -f %\{buildroot\}%\{mingw32_includedir\}/jxrlib/guiddef\.h$'
replacement = ''

[[components.jxrlib.overlays]]
description = "Remove mingw guiddef.h cleanup (mingw64)"
type = "spec-search-replace"
section = "%install"
regex = '^rm -f %\{buildroot\}%\{mingw64_includedir\}/jxrlib/guiddef\.h$'
replacement = ''

[[components.jxrlib.overlays]]
description = "Remove mingw debug install post step"
type = "spec-search-replace"
section = "%install"
regex = '^\%mingw_debug_install_post$'
replacement = ''
