[components.openfec]

[[components.openfec.overlays]]
description = "Suppress *-debuginfo subpackages via `%global debug_package %{nil}` to work around an automated malware-scan false-positive (high-entropy heuristic) on the compressed DWARF ELFs in the openfec-debuginfo-*.rpm artefacts. Trade-off: loses post-mortem gdb/crash symbols for libopenfec.so.1.4.2."
type = "spec-prepend-lines"
lines = ["%global debug_package %{nil}"]
