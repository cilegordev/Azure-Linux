# Disable the optional `extras` build conditional. This is part of the
# distro-wide effort to remove ffmpeg/libav* and a number of niche
# multimedia libraries (faad2, flite, game-music-emu, libdca, libmpcdec,
# libopenmpt, libqrencode, mjpegtools, openal, spandsp, vo-amrwbenc,
# wildmidi, zbar, zxing, etc.) that we do not want to maintain.
#
# Disabling 'extras' drops the -extras, -fluidsynth, -lv2, -wildmidi and
# -zbar subpackages. The dc1394 and onnx plugins are built independently
# (their bconds default ON on Fedora) but only packaged inside %files
# extras, so we must disable them too to avoid "unpackaged file" failures.
# AZL does not ship openh264. Set openh264 bcond off to prevent building
# gstreamer1-plugin-openh264 subpackage.

[components.gstreamer1-plugins-bad-free]
build.without = ["extras", "dc1394", "onnx", "openh264"]

# AZL does not ship opus — disable the opus parse plugin and remove its BR.

[[components.gstreamer1-plugins-bad-free.overlays]]
description = "Remove pkgconfig(opus) BuildRequires (opus not available in AZL)"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "pkgconfig(opus)"

[[components.gstreamer1-plugins-bad-free.overlays]]
description = "Disable the opus meson option"
type = "spec-search-replace"
section = "%build"
regex = '%meson \\'
replacement = """%meson \\
    -D opus=disabled \\"""

[[components.gstreamer1-plugins-bad-free.overlays]]
description = "Remove libgstopusparse.so from %files"
type = "spec-search-replace"
section = "%files"
regex = '%\{_libdir\}/gstreamer-%\{majorminor\}/libgstopusparse\.so'
replacement = ''
