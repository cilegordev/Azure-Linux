# Disable the optional `extras` build conditional. This is part of the
# distro-wide effort to remove ffmpeg/libav* and a number of niche
# multimedia libraries (faad2, flite, game-music-emu, libdca, libmpcdec,
# libopenmpt, libqrencode, mjpegtools, openal, spandsp, vo-amrwbenc,
# wildmidi, zbar, zxing, etc.) that we do not want to maintain.
#
# Disabling 'extras' drops the -extras, -fluidsynth, -lv2, -wildmidi and
# -zbar subpackages. The dc1394 and onnx plugins are built independently
# (their bconds default ON on Fedora) but only packaged inside %files
# extras, so we must disable them too to avoid "unpackaged file" failures.
# AZL does not ship openh264. Set openh264 bcond off to prevent building
# gstreamer1-plugin-openh264 subpackage.
#
# AZL does not ship webrtc-audio-processing (Google-derived AEC library,
# significantly behind upstream, downstream-maintenance burden — see PR
# #17329). Disabling the `webrtc` bcond drops BuildRequires on
# pkgconfig(webrtc-audio-coding-1) and pkgconfig(webrtc-audio-processing-1).
# `webrtc1` cascades off automatically because its bcond expression chains
# on `%{with webrtc}`. This also removes two plugins from the main
# gstreamer1-plugins-bad-free RPM that have no in-tree replacement:
#   - libgstwebrtcdsp.so  (WebRTC echo-cancel / AGC / noise-suppression
#                          GStreamer element; %files gated on `with webrtc`)
#   - libgstisac.so       (ISAC voice codec; %files gated on `with webrtc1`)
# Pipelines that reference `webrtcdsp` or `isac` will fail with
# "no such element" — there is no fallback. The unrelated GStreamer
# WebRTC API plugins (libgstwebrtc-1.0.so, libgstwebrtcnice-1.0.so,
# libgstwebrtc.so) are NOT affected; they come from a different source
# tree and do not depend on webrtc-audio-processing.
#
# AZL is dropping the `aom` component (AV1 reference encoder/decoder) — it
# is a niche multimedia codec not required by anything else in the distro.
# Disabling the `aom` bcond drops the BuildRequires on pkgconfig(aom) and
# the libgstaom.so AV1 GStreamer plugin (gated by `%if %{with aom}` in
# %files). Pipelines that reference `aomenc` / `aomdec` GStreamer elements
# will fail with "no such element" — there is no in-tree fallback. The
# bcond defaults ON via %{defined fedora} which is true in the AZL build env.

[components.gstreamer1-plugins-bad-free]
build.without = ["extras", "dc1394", "onnx", "openh264", "webrtc", "svtav1", "aom"]

# AZL does not ship svt-av1 — disable the svtav1 gstreamer plugin.
# The bcond defaults ON via %{defined fedora} which is true in the AZL build env.

# AZL does not ship opus — disable the opus parse plugin and remove its BR.

[[components.gstreamer1-plugins-bad-free.overlays]]
description = "Remove pkgconfig(opus) BuildRequires (opus not available in AZL)"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "pkgconfig(opus)"

[[components.gstreamer1-plugins-bad-free.overlays]]
description = "Disable the opus meson option"
type = "spec-search-replace"
section = "%build"
regex = '%meson \\'
replacement = """%meson \\
    -D opus=disabled \\"""

[[components.gstreamer1-plugins-bad-free.overlays]]
description = "Remove libgstopusparse.so from %files"
type = "spec-search-replace"
section = "%files"
regex = '%\{_libdir\}/gstreamer-%\{majorminor\}/libgstopusparse\.so'
replacement = ''
