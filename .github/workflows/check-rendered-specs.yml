# Reusable workflow — renders specs from a PR + resolves lock files, and
# checks both for drift.
#
# Called by the stub on the default branch (check-rendered-specs-stub.yml) via
# pull_request_target. The stub provides the PR details; this workflow runs:
#
#   1. update_locks (full distro)
#        -> update_locks_comment (drift PR comment, always)
#   2. render (only if update_locks succeeded; PR-scoped via the change-set
#              computed from pr-base..pr-head)
#        -> comment (drift PR comment, only when render actually ran)
#
# update_locks runs first because `azldev component changed` (used to scope
# the render set) reads input fingerprints that include lock content; a
# stale lock would steer it toward the wrong scope. When locks are dirty,
# render is skipped and only the locks comment is posted.
#
# Security: the PR checkout is data-only. We never execute code from the PR —
# azldev is installed from upstream, scripts come from the base branch checkout.
name: "Check Rendered Specs"

on:
  workflow_call:
    inputs:
      pr-head-sha:
        required: true
        type: string
      pr-head-repo:
        required: true
        type: string
      pr-base-sha:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      repo:
        required: true
        type: string

permissions: {}

# Belt-and-suspenders: the stub also sets concurrency, but keep it here so the
# contract survives refactoring / direct invocation.
concurrency:
  group: pr-drift-check-${{ inputs.repo }}-${{ inputs.pr-number }}
  cancel-in-progress: true

jobs:
  # Resolve lock files for PR's components and check for drift. Mirrors the
  # `render` job: same trusted-base + untrusted-PR-head split, same container,
  # same security posture (no pull-requests write here either). The drift
  # signal comes directly from `azldev component update`'s JSON output —
  # each entry's `changed` boolean tells us whether its lock file moved.
  # The patch artifact is a plain `git diff -- locks/` produced inside the
  # container so users can `git apply` the result.
  update_locks:
    name: Update locks + drift check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      patch-url: ${{ steps.upload-locks-patch.outputs.artifact-url }}
    steps:
      # --- Trusted base branch (tools, scripts, container config) ---
      - name: Checkout base (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          ref: "4.0"
          persist-credentials: false

      # --- PR head (untrusted data — TOML configs, overlays, locks) ---
      - name: Checkout PR head (data)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.pr-head-repo }}
          ref: ${{ inputs.pr-head-sha }}
          path: pr-head
          fetch-depth: 0
          persist-credentials: false

      - name: Build azldev runner container
        run: |
          docker build \
            --build-arg UID=$(id -u) \
            --build-arg AZLDEV_VERSION="$(cat .azldev-version)" \
            -t localhost/azldev-runner \
            -f .github/workflows/containers/azldev-runner.Dockerfile \
            .github/workflows/containers/

      # Update + diff run entirely inside the container — same sandbox knobs
      # as the render job (see the comment above the render step for why
      # SYS_ADMIN / seccomp=unconfined / apparmor=unconfined are needed).
      - name: Update locks + capture patch
        id: update
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "$WORKSPACE/locks-output"
          docker run --rm \
            --cap-add=SYS_ADMIN \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            -v "$WORKSPACE/pr-head:/workdir" \
            -v "$WORKSPACE/locks-output:/output" \
            localhost/azldev-runner \
            bash -eu -o pipefail -c '
              # Pre-create the output file with a parse-able sentinel so the
              # downstream `update-output` artifact upload (if: always())
              # never fails just because azldev / the container crashed
              # before producing the file. The locks-comment script
              # already treats `null` as "no drift".
              echo null > /output/update-output.json
              # Capture stdout (JSON) separately from stderr (logs).
              azldev component update -a -O json \
                > /output/update-output.json
              LOCKS_DIR=$(azldev config dump -q -f json | jq -r .project.lockDir)
              # `git add -N` (intent-to-add) so net-new lock files (for
              # components that did not previously have one) show up in
              # `git diff` as additions. Without this, only modifications to
              # already-tracked locks would land in the patch.
              # `git diff` is safe here: we are inside the container with the
              # PR head at /workdir, so any poisoned .git/config attributes
              # in the PR cannot escape the sandbox.
              git -C /workdir add --intent-to-add -- "$LOCKS_DIR" 2>/dev/null || true
              git -C /workdir diff --no-color -- "$LOCKS_DIR" \
                > /output/locks.patch || true
              # `hashFiles()` returns the SHA256 of an empty file (still
              # non-empty), so removing the file outright is the only way
              # to make the upload steps skip when there is no drift.
              [ -s /output/locks.patch ] || rm -f /output/locks.patch
            '

      # Dual upload: `archive: false` (v7 feature) gives browser users a direct
      # download of the raw patch (artifact name is derived from the filename,
      # so `name:` is ignored here — that's why we need the second upload).
      # The zipped `locks-patch` artifact is for `gh run download`, which only
      # works with named artifacts.
      - name: Upload locks patch (unzipped, for browser download)
        id: upload-locks-patch
        if: hashFiles('locks-output/locks.patch') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: locks-output/locks.patch
          archive: false

      # See: https://github.com/cli/cli/issues/13012 for why this is needed.
      - name: Upload locks patch (zipped, for gh run download)
        if: hashFiles('locks-output/locks.patch') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: locks-patch
          path: locks-output/locks.patch

      - name: Upload update output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: update-output
          path: locks-output/update-output.json

      # Fail the job when any component's lock file drifted. Uses the
      # authoritative JSON output rather than the patch file so we catch
      # drift even if patch generation itself regresses.
      # `success() || failure()` (rather than `always()`) so a flaky upload
      # step above can't mask drift behind a confusing artifact-upload error,
      # but a cancelled run isn't misattributed to lock drift either.
      - name: Fail on lock drift
        if: success() || failure()
        run: |
          set -euo pipefail
          # Guard against the upstream container failing before it could
          # write the sentinel `update-output.json` (image build error,
          # mount failure, etc.) — we'd rather surface that real failure
          # than a misleading `jq: file not found` here.
          if [ ! -f locks-output/update-output.json ]; then
            echo "::warning::locks-output/update-output.json missing; skipping drift check (see earlier step failure for the real cause)"
            exit 0
          fi
          changed=$(jq '[.[]? | select(.changed == true)] | length' locks-output/update-output.json)
          if [ "$changed" -gt 0 ]; then
            echo "::error::${changed} lock file(s) are out of date — run 'azldev component update -a' and commit the result"
            exit 1
          fi

  # Post the locks PR comment. Same security posture as the `comment` job:
  # `pull-requests: write` is only granted to a job that does NOT execute any
  # PR-derived code — only the trusted base branch is checked out, and the
  # update-output artifact is consumed in trusted shape.
  update_locks_comment:
    name: Post locks drift comment
    needs: update_locks
    if: always() && needs.update_locks.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # Post/update/delete drift comments on PRs
    steps:
      - name: Checkout base (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          ref: "4.0"
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download update output
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: update-output
          path: update-output

      - name: Post PR comment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr-number }}
          PATCH_URL: ${{ needs.update_locks.outputs.patch-url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python .github/workflows/scripts/locks-check/post_locks_comment.py \
            --repo "$PR_REPO" \
            --pr "$PR_NUMBER" \
            --update-output update-output/update-output.json \
            --artifacts-url "$PATCH_URL" \
            --run-id "$RUN_ID"

  # Render PR's specs + check for drift. Runs PR-derived data through the
  # container; deliberately has NO pull-requests write (and no secrets beyond
  # the default read-only token) so that even if the container somehow leaks
  # into the host, it can't touch the PR. All output flows to the next job via
  # artifacts + job outputs only.
  render:
    name: Render + drift check
    # Gate render on a clean lock check. `azldev component changed` (used by
    # the render-scope helper) reads input fingerprints that include lock
    # content, so stale locks would steer it toward the wrong scope. Skip
    # render and let the locks PR comment carry the fix instructions.
    needs: update_locks
    if: needs.update_locks.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      patch-url: ${{ steps.upload-patch.outputs.artifact-url }}
    steps:
      # Defense-in-depth: validate the SHA and repo inputs before they
      # reach any `git`/`azldev` invocation inside the container. GitHub
      # populates these from the pull_request event, but the reusable
      # workflow is also callable directly so we don't assume the contract.
      - name: Validate inputs
        env:
          PR_BASE_SHA: ${{ inputs.pr-base-sha }}
          PR_HEAD_SHA: ${{ inputs.pr-head-sha }}
          BASE_REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          for v in PR_BASE_SHA PR_HEAD_SHA; do
            sha="${!v}"
            if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::$v is not a 40-char lowercase hex SHA: '$sha'"
              exit 1
            fi
          done
          if ! [[ "$BASE_REPO" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::BASE_REPO is not a valid owner/repo: '$BASE_REPO'"
            exit 1
          fi

      # --- Trusted base branch (tools, scripts, container config) ---
      - name: Checkout base (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          ref: "4.0"
          persist-credentials: false

      # --- PR head (untrusted data — TOML configs, overlays, specs) ---
      - name: Checkout PR head (data)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.pr-head-repo }}
          ref: ${{ inputs.pr-head-sha }}
          path: pr-head
          fetch-depth: 0
          persist-credentials: false

      - name: Build azldev runner container
        run: |
          docker build \
            --build-arg UID=$(id -u) \
            --build-arg AZLDEV_VERSION="$(cat .azldev-version)" \
            -t localhost/azldev-runner \
            -f .github/workflows/containers/azldev-runner.Dockerfile \
            .github/workflows/containers/

      # Render + drift-check run entirely inside the container. The host never
      # invokes git against PR data: all git operations happen in the sandboxed
      # environment, and the host only reads trusted-shape outputs
      # (report.json, rendered-specs.patch) from a dedicated output volume.
      # This dodges the whole class of poisoned-.git/config attacks
      # (diff.external, diff drivers, filter drivers, hooks, etc.).
      #
      # Sandbox knobs:
      #   --cap-add=SYS_ADMIN      mock needs mount namespaces for chroot
      #   seccomp=unconfined       mock uses syscalls filtered by the default profile
      #   apparmor=unconfined      ubuntu-latest ships docker-default AppArmor which
      #                            blocks `mount -t tmpfs` on paths under /var/lib/mock
      #                            even with SYS_ADMIN granted
      # We still avoid --privileged (broader blast radius).
      # --security-opt no-new-privileges would be nice but mock's userhelper
      # requires setuid, which that flag blocks.
      - name: Render + check for drift
        id: check
        env:
          WORKSPACE: ${{ github.workspace }}
          PR_BASE_SHA: ${{ inputs.pr-base-sha }}
          PR_HEAD_SHA: ${{ inputs.pr-head-sha }}
          BASE_REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          mkdir -p "$WORKSPACE/render-output"
          # The two script trees mount at sibling top-level in-container
          # paths (/scripts-render and /scripts-components). They used to
          # nest as /scripts and /scripts/components, but Docker cannot
          # create the inner mountpoint inside a read-only outer mount
          # whose source directory does not already contain that subdir.
          docker run --rm \
            --cap-add=SYS_ADMIN \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            -v "$WORKSPACE/pr-head:/workdir" \
            -v "$WORKSPACE/render-output:/output" \
            -v "$WORKSPACE/.github/workflows/scripts/render-specs-check:/scripts-render:ro" \
            -v "$WORKSPACE/.github/workflows/scripts/components:/scripts-components:ro" \
            -e PR_BASE_SHA \
            -e PR_HEAD_SHA \
            -e BASE_REPO \
            localhost/azldev-runner \
            bash -eu -o pipefail -c '
              # Stale forks may not have the upstream base SHA in their
              # object store. Fetch it explicitly so `compute_changed.sh`
              # can resolve `--from <base-sha>`. The base repo is public
              # so no auth is needed; --depth=1 keeps the fetch cheap.
              git -C /workdir remote add base "https://github.com/$BASE_REPO.git" 2>/dev/null || true
              git -C /workdir fetch --no-tags --depth=1 base "$PR_BASE_SHA"

              # Compute the render set (PR-touched components). Safe here
              # because the locks gate has already run successfully -- input
              # fingerprints used by `azldev component changed` reflect the
              # current head.
              /scripts-components/compute_change_set.sh \
                --output-dir /output/change-set \
                --source-commit "$PR_HEAD_SHA" \
                --target-commit "$PR_BASE_SHA"

              SPECS_DIR=$(azldev config dump -q -f json | jq -r .project.renderedSpecsDir)

              # Components removed in this PR no longer have a comp.toml, so
              # `azldev component render` will not touch (or clean) their old
              # specs directory. Delete `<specs>/<first-char>/<name>/` for
              # each deleted component in the working tree so the missing
              # files surface as drift in the existing
              # `check_rendered_specs.py` report (and end up in the fix
              # patch as deletions). This replaces the orphan-cleanup that
              # `azldev component render -a --clean-stale` used to do for
              # us; with a scoped render the deleted components are not in
              # the render set, so nothing else cleans them.
              #
              # Scope caveat: this only catches components deleted IN THIS
              # PR. Pre-existing orphans (stale spec dirs whose component
              # was removed in an earlier PR without a matching render)
              # are not caught here.
              jq -r ".[] | select(.changeType == \"deleted\") | .component" \
                /output/change-set/changed-components.json \
                | while IFS= read -r name; do
                    [ -n "$name" ] || continue
                    # Defense-in-depth: refuse component names with path
                    # metacharacters before constructing the rm -rf target.
                    # `azldev` does not currently validate names against
                    # this set, and `.comp.toml` quoted keys allow `/`,
                    # `..`, etc.
                    if [[ ! "$name" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ ]]; then
                      echo "::warning::Refusing suspicious component name from changed-components.json: $name"
                      continue
                    fi
                    # Spec bucket dirs are lowercase (specs/a/, specs/r/, ...)
                    # while component names can be uppercase (e.g. `R`, `AMF`,
                    # `CGAL`). Lowercase the first char so the path matches.
                    first_char="${name:0:1}"
                    first_char="${first_char,,}"
                    orphan_dir="$SPECS_DIR/$first_char/$name"
                    if [ -d "$orphan_dir" ]; then
                      echo "Cleaning orphan specs dir for deleted component: $orphan_dir"
                      rm -rf "$orphan_dir"
                    fi
                  done

              if [ ! -s /output/change-set/render-set.txt ]; then
                echo "No PR-scoped components -- skipping render."
                # Synthesize an empty render-output.json so the artifact
                # upload (if: always()) and downstream comment job have a
                # well-formed payload.
                echo "[]" > /output/render-output.json
              else
                # `-x` fails loudly if the arg list would split into multiple
                # xargs invocations -- each batch after the first would
                # overwrite the previous JSON output to render-output.json.
                # Current component counts are well below ARG_MAX, but
                # `-n 50000` gives `-x` teeth (without `-n`/`-L`, GNU xargs
                # never splits). `--` ends azldev option parsing so component
                # names beginning with `-` (none today) are unambiguous.
                xargs -x -n 50000 -d "\n" azldev component render -q -O json -- \
                  < /output/change-set/render-set.txt \
                  > /output/render-output.json
              fi

              # check_rendered_specs.py diffs the working tree (now containing
              # any scoped re-render output and any orphan-cleanup deletions)
              # against HEAD and produces the user-facing patch.
              python3 /scripts-render/check_rendered_specs.py \
                --specs-dir "$SPECS_DIR" \
                --report /output/render-check-report.json \
                --patch /output/rendered-specs.patch
            '

      # Dual upload: `archive: false` (v7 feature) gives browser users a direct
      # download of the raw patch (artifact name is derived from the filename,
      # so `name:` is ignored here — that's why we need the second upload).
      # The zipped `rendered-specs-patch` artifact is for `gh run download`,
      # which only works with named artifacts.
      - name: Upload fix patch (unzipped, for browser download)
        id: upload-patch
        if: always() && hashFiles('render-output/rendered-specs.patch') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: render-output/rendered-specs.patch
          archive: false

      # See: https://github.com/cli/cli/issues/13012 for why this is needed.
      - name: Upload fix patch (zipped, for gh run download)
        if: always() && hashFiles('render-output/rendered-specs.patch') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rendered-specs-patch
          path: render-output/rendered-specs.patch

      - name: Upload render output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: render-output
          path: |
            render-output/render-output.json
            render-output/render-check-report.json

  # Post the PR comment. Runs in a separate job so the `pull-requests: write`
  # token is only granted to a job that does NOT execute any PR-derived code:
  # it only checks out the trusted base branch (for the poster script) and
  # consumes the trusted-shape report artifact from the render job.
  comment:
    name: Post drift comment
    needs: render
    # When render is skipped (locks failed), there is no report artifact to
    # post and the locks PR comment already carries the fix. The
    # `!cancelled()` status function is required: a job-level `if:` that
    # only references `needs.render.result` would never run when render
    # has a non-success conclusion, because GitHub evaluates the implicit
    # success-of-needs gate BEFORE the `if:` -- the function call is what
    # tells GitHub to evaluate the `if:` anyway.
    if: ${{ !cancelled() && needs.render.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # Post/update/delete drift comments on PRs
    steps:
      - name: Checkout base (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          ref: "4.0"
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download render report
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: render-output
          path: render-output

      - name: Post PR comment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr-number }}
          PATCH_URL: ${{ needs.render.outputs.patch-url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python .github/workflows/scripts/render-specs-check/post_render_comment.py \
            --repo "$PR_REPO" \
            --pr "$PR_NUMBER" \
            --report render-output/render-check-report.json \
            --artifacts-url "$PATCH_URL" \
            --run-id "$RUN_ID"
